version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: digitca-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  openldap:
    image: osixia/openldap:1.5.0
    container_name: digitca-openldap
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: "DigitCA Dev"
      LDAP_DOMAIN: "example.org"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_TLS: "false"
    ports:
      - "389:389"
    volumes:
      - ./infra/ldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/50-bootstrap.ldif:ro

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: digitca-phpldapadmin
    restart: unless-stopped
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8081:80"
    depends_on:
      - openldap

  api:
    build: .
    container_name: digitca-api
    restart: unless-stopped
    command: ["serve"]
    env_file: .env
    environment:
      HTTP_BIND: "0.0.0.0"
      HTTP_PORT: "8080"
      LDAP_PUBLISH_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - openldap

volumes:
  mongo-data:

